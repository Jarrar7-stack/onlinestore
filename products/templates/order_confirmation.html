<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center">Order Confirmation</h1>
        <p class="text-center">Thank you for your purchase! Here are the details:</p>
        <div class="card">
            <div class="card-body">
                <h3 class="card-title">Order Summary</h3>
                <ul class="list-group">
                    {% for item in order.orderitem_set.all %}
                    <li class="list-group-item">
                        {{ item.quantity }} x {{ item.product.name }} - ${{ item.product.price }}
                    </li>
                    {% endfor %}
                </ul>
                <h4 class="text-end mt-3">Total: ${{ order.total_price }}</h4>
            </div>
        </div>
        <div class="text-center mt-4">
            <a href="{% url 'home' %}" class="btn btn-success">Continue Shopping</a>
        </div>
    </div>
</body>
</html>
